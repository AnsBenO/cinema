version: "3.9"

services:
    postgres:
        image: postgres:15-alpine
        restart: always
        environment:
            POSTGRES_USER: dev
            POSTGRES_PASSWORD: devpass
            POSTGRES_DB: cinema_dev
        ports:
            - "5435:5432"
        volumes:
            - db-data:/var/lib/postgresql/data

volumes:
    db-data:
