<div id="modal"
     class="modal fixed flex items-center justify-center inset-0 bg-gray-900 bg-opacity-60 transition-opacity z-50 overflow-scroll">
    <button class="absolute top-4 right-8 text-white text-3xl font-bold cursor-pointer hover:text-gray-400 close"
            onclick="closeModal()">
        <i class="fa-solid fa-xmark"></i>
    </button>
    <!-- Modal content -->
    <div class="p-5 bg-white shadow-lg rounded-lg relative w-4/5 max-w-3xl fade-in" id="contentDiv">
        <h2 class="text-center text-gray-700 mb-6 text-2xl font-bold tracking-wide capitalize border-b-2 border-gray-300 py-2">
            <i class="fa-solid fa-bookmark"></i>
            <span th:text="${genre.id != null} ? 'Edit Genre' : 'Create a New Genre'"></span>
        </h2>

        <!-- Genre Form -->
        <form enctype="multipart/form-data" th:action="@{/genres}" th:object="${genre}" method="post" class="space-y-6">

            <!-- Genre Label -->
            <div class="flex flex-col">
                <label for="label" class="text-gray-700 font-semibold flex items-center gap-2">
                    <i class="fa-solid fa-tag"></i> Genre Label
                </label>
                <input type="text" id="label" th:field="*{label}"
                       class="mt-1 p-2 border rounded-lg focus:outline-none focus:ring focus:ring-celeste-default"
                       required>
            </div>

            <!-- Submit Button -->
            <div class="flex justify-end">
                <button type="submit"
                        class="bg-blue-800 text-white px-6 py-2 rounded-lg shadow hover:bg-blue-900">
                    <i class="fa-solid fa-plus"></i>
                    <span th:text="${genre.id != null} ? 'Update Genre' : 'Create Genre'"></span>
                </button>
            </div>
        </form>
    </div>
</div>
