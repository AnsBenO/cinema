<div id="modal"
     class="modal fixed flex items-center justify-center inset-0 bg-gray-900 bg-opacity-60 transition-opacity z-50 overflow-scroll">
    <button class="absolute top-4 right-8 text-white text-3xl font-bold cursor-pointer hover:text-gray-400 close"
            onclick="closeModal()">
        <i class="fa-solid fa-xmark"></i>
    </button>
    <!-- Modal content -->
    <div class="p-5 bg-white shadow-lg rounded-lg relative w-4/5 max-w-3xl fade-in" id="contentDiv">
        <h2 class="text-center text-gray-700 mb-6 text-2xl font-bold tracking-wide capitalize border-b-2 border-gray-300 py-2">
            <i class="fa-solid fa-film"></i> 
            <span th:text="${film.id != null} ? 'Edit Film' : 'Create a New Film'"></span>
        </h2>

        <!-- Film Form -->
        <form  enctype="multipart/form-data" th:action="@{/films}" th:object="${film}" method="post" class="space-y-6">
            
            <!-- Film Title and Genre -->
            <div class="flex gap-4">
                <!-- Film Title -->
                <div class="flex flex-col w-1/2">
                    <label for="title" class="text-gray-700 font-semibold flex items-center gap-2">
                        <i class="fa-solid fa-square-pen"></i> Title
                    </label>
                    <input type="text" id="title" th:field="*{title}"
                        class="mt-1 p-2 border rounded-lg focus:outline-none focus:ring focus:ring-celeste-default"
                        required>
                </div>

                <!-- Genre -->
                <div class="flex flex-col w-1/2">
                    <label for="genre" class="text-gray-700 font-semibold flex items-center gap-2">
                        <i class="fa-solid fa-film"></i> Genre
                    </label>
                    <select id="genre" th:field="*{genre}" class="mt-1 p-2 border rounded-lg focus:outline-none focus:ring focus:ring-celeste-default" required>
                        <option value="" disabled>Select Genre</option>
                        <option th:each="genre : ${genres}" th:value="${genre.id}" th:text="${genre.label}"></option>
                    </select>
                </div>
            </div>

            <!-- Duration and Year -->
            <div class="flex gap-4">
                <!-- Duration -->
                <div class="flex flex-col w-1/2">
                    <label for="duration" class="text-gray-700 font-semibold flex items-center gap-2">
                        <i class="fa-solid fa-clock"></i> Duration (in minutes)
                    </label>
                    <input type="number" id="duration" th:field="*{duration}"
                        class="mt-1 p-2 border rounded-lg focus:outline-none focus:ring focus:ring-celeste-default"
                        required>
                </div>

                <!-- Year -->
                <div class="flex flex-col w-1/2">
                    <label for="year" class="text-gray-700 font-semibold flex items-center gap-2">
                        <i class="fa-solid fa-calendar"></i> Year
                    </label>
                    <input type="number" id="year" th:field="*{year}" min=1900 max="${T(java.time.Year).now().value}" 
                        class="mt-1 p-2 border rounded-lg focus:outline-none focus:ring focus:ring-celeste-default"
                        required>
                </div>
            </div>

            <!-- Nationality and Director -->
            <div class="flex gap-4">
                <!-- Nationality -->
                <div class="flex flex-col w-1/2">
                    <label for="nationality" class="text-gray-700 font-semibold flex items-center gap-2">
                        <i class="fa-solid fa-flag"></i> Nationality
                    </label>
                    <select id="nationality" th:field="*{nationality}" class="mt-1 p-2 border rounded-lg focus:outline-none focus:ring focus:ring-celeste-default" required>
                        <option value="" disabled>Select Nationality</option>
                        <option th:each="nationality : ${nationalities}" th:value="${nationality.id}" th:text="${nationality.label}"></option>
                    </select>
                </div>

                <!-- Director -->
                <div class="flex flex-col w-1/2">
                    <label for="director" class="text-gray-700 font-semibold flex items-center gap-2">
                        <i class="fa-solid fa-user-tie"></i> Director
                    </label>
                    <select id="director" th:field="*{director}" class="mt-1 p-2 border rounded-lg focus:outline-none focus:ring focus:ring-celeste-default" required>
                        <option value="" disabled>Select Director</option>
                        <option th:each="director : ${directors}" th:value="${director.id}" th:text="${director.firstName} + ' ' + ${director.lastName}"></option>
                    </select>
                </div>
            </div>

            <!-- Actors and Film Image Upload -->
            <div class="flex gap-4">
                <!-- Actors -->
                <div class="flex flex-col w-1/2">
                    <label for="actors" class="text-gray-700 font-semibold flex items-center gap-2">
                        <i class="fa-solid fa-users"></i> Actors
                    </label>
                    <select id="actors" th:field="*{actors}" class="mt-1 p-2 border rounded-lg focus:outline-none focus:ring focus:ring-celeste-default" multiple required>
                        <option value="" disabled>Select Actors</option>
                        <option th:each="actor : ${actors}" th:value="${actor.id}" th:text="${actor.firstName} + ' ' + ${actor.lastName}"></option>
                    </select>
                </div>

<!--                 Film Poster Image Upload -->
                <div class="flex flex-col w-1/2">
                    <label for="file" class="text-gray-700 font-semibold flex items-center gap-2">
                        <i class="fa-solid fa-image"></i> Film Poster
                    </label>
                    <input type="file" id="file" name="file" accept="image/*"
                        class="mt-1 p-2 border rounded-lg focus:outline-none focus:ring focus:ring-celeste-default">
                </div>
            </div>

            <!-- Submit Button -->
            <div class="flex justify-end">
                <button type="submit"
                        class="bg-blue-800 text-white px-6 py-2 rounded-lg shadow hover:bg-blue-900">
                    <i class="fa-solid fa-plus"></i> 
                    <span th:text="${film.id != null} ? 'Update Film' : 'Create Film'"></span>
                </button>
            </div>
        </form>
    </div>
</div>
