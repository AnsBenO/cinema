<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layouts/app}">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Films</title>
</head>

<body>
    <main layout:fragment="content" id="content" class="p-6 w-full" data-location="films">

        <!-- Films Table -->
        <div id="filmsTable" th:fragment="films-table" class="w-full">
            <header class="flex flex-row justify-between">
                <!-- Search Form -->
                <form hx-get="/films" hx-replace="outerHtml" hx-target="#filmsTable"
                    class="flex items-center space-x-2 mb-4">
                    <div class="relative flex items-center">
                        <i class="fa-solid fa-magnifying-glass absolute left-2 top-1/2 -translate-y-1/2 text-gray-500"></i>
                        <input type="text" name="keyword" placeholder="Search films..." th:value="${keyword}"
                            class="pl-8 pr-2 py-2 border border-gray-300 rounded-l-lg 
                            focus:outline-none focus:ring-2 focus:ring-blue-600 h-10 w-64"/>
                    </div>
                    <input type="hidden" name="page" th:value="1" />
                    <select name="genre"  th:value="${genre}"
                        class="p-2 border-t border-b border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-900 h-10">
                        <option value="" >All Genres</option>
                        <option th:each="g : ${genres}" th:value="${g.label}" th:text="${g.label}" th:selected="${g.label == genre}"></option>
                    </select>
                    <button type="submit" class="px-4 py-2 bg-blue-600 hover:bg-blue-400 text-white rounded-r-lg h-10">
                        Search
                    </button>
                </form>

                <!-- Add Films Button -->
                <div class="flex items-center space-x-2">
                    <a hx-get="/films/add" hx-swap="outerHtml" hx-target=".modalDiv"
                        class="px-3 py-1 border border-gray-300 rounded hover:bg-gray-100 cursor-pointer select-none text-green-500">
                        <i class="fa-solid fa-plus"></i> <span class="text-xs font-bold">Add
                            Film</span>
                    </a>
                </div>

            </header>

            <table class="min-w-full bg-white border border-gray-300 rounded-lg shadow-md">
                <thead class="bg-zinc-100 text-blue-900 font-bold">
                    <tr>
                        <th class="py-3 px-4 text-left">Id</th>
                        <th class="py-3 px-4 text-left">Title</th>
                        <th class="py-3 px-4 text-left">Genre</th>
                        <th class="py-3 px-4 text-left">Duration</th>
                        <th class="py-3 px-4 text-left">Year</th>
                        <th class="py-3 px-4 text-left">Nationality</th>
                        <th class="py-3 px-4 text-left">Director</th>
                        <th class="py-3 px-4 text-left">Image</th>
                        <th class="py-3 px-4 text-left">Medias</th>
                        <th class="py-3 px-4 text-left">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="film : ${films.data}" class="border-b hover:bg-gray-100">
                        <td class="py-3 px-4" th:text="${film.id}"></td>
                        <td class="py-3 px-4" th:text="${film.title}"></td>
                        <td class="py-3 px-4" th:text="${film.genre.label}"></td>
                        <td class="py-3 px-4" th:text="${film.duration + ' min'}"></td>
                        <td class="py-3 px-4" th:text="${film.year}"></td>
                        <td class="py-3 px-4" th:text="${film.nationality.label}"></td>
                        <td class="py-3 px-4" th:text="${film.director.firstName + ' ' + film.director.lastName}"></td>
                        <td class="py-3 px-4">
                        
							<button class="view-image-btn p-2 hover:opacity-70 transition-opacity"
							        th:data-image-src="${film.imageUrl}"
							        th:data-image-alt="${film.title}">
							    <i class="fa-regular fa-image text-blue-400"></i>
							</button>	
						</td>
                        <td class="py-3 px-4">
                            <a class="view-medias-btn p-2 hover:opacity-70 transition-opacity"
                            	th:href="@{/medias/{id_film}(id_film=${film.id})}"

                                >
                                <i class="fa-regular fa-folder text-green-400"></i>
                            </a>
                        </td>
                        <td class="py-3 px-4">
							<a th:hx-get="@{/films/edit/{id}(id=${film.id})}" 
								th:hx-swap="${'innerHtml'}"
                                th:hx-target="${'.modalDiv'}"
                                class="text-blue-500 cursor-pointer">Edit</a> |
                            <a th:href="@{/films/delete/{id}(id=${film.id})}"  onclick="return confirmDelete(this);" class="text-red-500">Delete</a>
                        </td>
                    </tr>
                </tbody>
            </table>

            <!-- Pagination -->
            <div class="flex justify-between items-center mt-4">
                <div>
                    Page <span th:text="${films.pageNumber}"></span> of <span th:text="${films.totalPages}"></span>
                    (Total items: <span th:text="${films.totalElements}"></span>)
                </div>
                <div class="flex items-center space-x-2">
                    <a th:if="${films.hasPrevious}"
                        th:hx-get="'/films?page=' + ${films.pageNumber - 1} + '&keyword=' + ${keyword} + '&genre=' + ${genre.label}"
                        hx-target="#filmsTable"
                        class="px-3 py-1 border border-gray-300 rounded hover:bg-gray-100 cursor-pointer select-none">
                        <i class="fa-solid fa-arrow-left"></i>
                    </a>
                    <a th:if="${films.hasNext}"
                        th:hx-get="'/films?page=' + ${films.pageNumber + 1} + '&keyword=' + ${keyword} + '&genre=' + ${genre}"
                        hx-target="#filmsTable"
                        class="px-3 py-1 border border-gray-300 rounded hover:bg-gray-100 cursor-pointer select-none">
                        <i class="fa-solid fa-arrow-right"></i>
                    </a>
                </div>
                <div th:replace="~{fragments/film-image-modal}"></div>
                <script th:src="@{/js/viewImage.js}"></script>
                <script>
				    function confirmDelete(link) {
				        const isConfirmed = confirm("Are you sure you want to delete this film?");
				        if (isConfirmed) {
				            window.location.href = link.getAttribute("href");
				        }
				        return false; 
				    }
				</script>
            </div>
        </div>
    </main>
</body>

</html>
