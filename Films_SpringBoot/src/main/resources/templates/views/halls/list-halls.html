<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layouts/app}">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Halls</title>
</head>

<body>
	<main layout:fragment="content" id="content" class="p-6 w-full"
		data-location="halls">

		<!-- Halls Table -->
		<div id="hallsTable" th:fragment="halls-table" class="w-full">
			<header class="flex flex-row justify-between">
				<!-- Search Form -->
				<form hx-get="/halls" hx-replace="outerHtml" hx-target="#hallsTable"
					class="flex items-center space-x-2 mb-4">
					<div class="relative flex items-center">
						<i
							class="fa-solid fa-magnifying-glass absolute left-2 top-1/2 -translate-y-1/2 text-gray-500"></i>
						<input type="text" name="keyword" placeholder="Search halls..."
							class="pl-8 pr-2 py-2 border border-gray-300 rounded-l-lg focus:outline-none focus:ring-2 focus:ring-blue-900 h-10 w-64"
							th:value="${keyword}" />
					</div>

					<input type="hidden" name="page" th:value="1" />

					<button type="submit"
						class="px-4 py-2 bg-blue-900 hover:bg-blue-600 text-white rounded-r-lg h-10">
						Search</button>

				</form>

				<div class="flex items-center space-x-2 my-1 justify-end">
					<!-- Add Hall Button -->
					<a hx-get="/halls/add" hx-swap="outerHtml" hx-target=".modalDiv"
						class="px-3 py-1 border border-gray-300 rounded hover:bg-gray-100 cursor-pointer select-none text-green-500">
						<i class="fa-solid fa-plus"></i> <span class="text-xs font-bold">Add
							Hall</span>
					</a>



					
				</div>
			</header>

			<table
				class="min-w-full bg-white border border-gray-300 rounded-lg shadow-md">
				<thead class="bg-zinc-100 text-blue-900 font-bold">
					<tr>
						<th class="py-3 px-4 text-left font-bold">Id</th>
						<th class="py-3 px-4 text-left font-bold">Capacity</th>
						<th class="py-3 px-4 text-left font-bold">Number</th>
						<th class="py-3 px-4 text-left font-bold">Actions</th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="hall : ${halls.data}"
						class="border-b hover:bg-gray-100">
						<td class="py-3 px-4" th:text="${hall.id}"></td>
						<td class="py-3 px-4" th:text="${hall.capacity}"></td>
						<td class="py-3 px-4" th:text="${hall.number}"></td>
						<td class="py-3 px-4"><a
							th:hx-get="@{/halls/edit/{id}(id=${hall.id})}"
							th:hx-swap="${'innerHtml'}" th:hx-target=".modalDiv"
							class="text-blue-500 cursor-pointer">Edit</a> | <a
							th:href="@{/halls/delete/{id}(id=${hall.id})}"
							onclick="return confirmDelete(this);"
							class="text-red-500 cursor-pointer"> Delete </a></td>
						</td>
					</tr>
				</tbody>
			</table>

			<!-- Pagination Info -->
			<div class="flex justify-between items-center mt-4">
				<div>
					Page <span th:text="${halls.pageNumber}"></span> of <span
						th:text="${halls.totalPages}"></span> (Total items: <span
						th:text="${halls.totalElements}"></span>)
				</div>
				<div class="flex items-center space-x-2">
					<a th:if="${halls.hasPrevious}"
						th:hx-get="'/halls?page=' + (${halls.pageNumber - 1}) + '&keyword=' + ${keyword} + '&capacity=' + ${capacity}"
						hx-target="#hallsTable"
						class="px-3 py-1 border border-gray-300 rounded hover:bg-gray-100 cursor-pointer select-none">
						<i class="fa-solid fa-arrow-left"></i>
					</a> <a th:if="${halls.hasNext}"
						th:hx-get="'/halls?page=' + (${halls.pageNumber + 1}) + '&keyword=' + ${keyword} + '&capacity=' + ${capacity}"
						hx-target="#hallsTable"
						class="px-3 py-1 border border-gray-300 rounded hover:bg-gray-100 cursor-pointer select-none">
						<i class="fa-solid fa-arrow-right"></i>
					</a>
				</div>
				<script>
					function confirmDelete(link) {
						const isConfirmed = confirm("Are you sure you want to delete this hall?");
						if (isConfirmed) {
							window.location.href = link.getAttribute("href");
						}
						return false;
					}
				</script>
			</div>
		</div>

	</main>
</body>

</html>
