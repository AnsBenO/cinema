<div id="modal"
      class="modal fixed flex items-center justify-center inset-0 bg-gray-900 bg-opacity-60 transition-opacity z-50 overflow-scroll">
      <button class="absolute top-4 right-8 text-white text-3xl font-bold cursor-pointer hover:text-gray-400 close"
            onclick="closeModal()">
            <i class="fa-solid fa-xmark"></i>
      </button>
      <!-- Modal content -->
      <div class="p-5 bg-white shadow-lg rounded-lg relative w-4/5 max-w-3xl fade-in" id="contentDiv">
            <h2
                  class="text-center text-gray-700 mb-6 text-2xl font-bold tracking-wide capitalize border-b-2 border-gray-300 py-2">
                  <i class="fa-solid fa-film"></i>
                  Create a New Screening
            </h2>

            <!-- Add Screening Form -->
            <form th:action="@{/screenings}" th:object="${screening}" method="post" class="space-y-6">
                  <!-- Start Time -->
                  <div class="flex flex-col">
                        <label for="startTime" class="text-gray-700 font-semibold flex items-center gap-2">
                              <i class="fa-regular fa-clock"></i> Start Time
                        </label>
                        <input type="datetime-local" id="startTime" th:field="*{startTime}"
                              class="mt-1 p-2 border rounded-lg focus:outline-none focus:ring focus:ring-celeste-default"
                              required>
                  </div>

                  <!-- End Time -->
                  <div class="flex flex-col">
                        <label for="endTime" class="text-gray-700 font-semibold flex items-center gap-2">
                              <i class="fa-regular fa-clock"></i> End Time
                        </label>
                        <input type="datetime-local" id="endTime" th:field="*{endTime}"
                              class="mt-1 p-2 border rounded-lg focus:outline-none focus:ring focus:ring-celeste-default"
                              required>
                  </div>

                  <!-- Film -->
                  <div class="flex flex-col">
                        <label for="film" class="text-gray-700 font-semibold flex items-center gap-2">
                              <i class="fa-solid fa-film"></i> Film
                        </label>
                        <select id="film" th:field="*{film}"
                              class="mt-1 p-2 border rounded-lg focus:outline-none focus:ring focus:ring-celeste-default"
                              required>
                              <option value="" selected>Select a Film</option>
                              <option th:each="film : ${films}" th:value="${film.id}" th:text="${film.title}"></option>
                        </select>
                  </div>

                  <!-- Hall -->
                  <div class="flex flex-col">
                        <label for="hall" class="text-gray-700 font-semibold flex items-center gap-2">
                              <i class="fa-solid fa-building"></i> Hall
                        </label>
                        <select id="hall" th:field="*{hall}"
                              class="mt-1 p-2 border rounded-lg focus:outline-none focus:ring focus:ring-celeste-default"
                              required>
                              <option value="" selected>Select a Hall</option>
                              <option th:each="hall : ${halls}" th:value="${hall.id}" th:text="${hall.number}"></option>
                        </select>
                  </div>

                  <!-- Submit Button -->
                  <div class="flex justify-end">
                        <button type="submit"
                              class="bg-blue-800 text-white px-6 py-2 rounded-lg shadow hover:bg-blue-900">
                              <i class="fa-solid fa-plus"></i> Create Screening
                        </button>
                  </div>
            </form>
      </div>
</div>
