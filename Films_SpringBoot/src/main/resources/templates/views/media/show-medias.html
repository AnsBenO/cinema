<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/app}">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Film Media Page</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome/css/font-awesome.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
</head>
<body>
<main layout:fragment="content" id="content" class="p-6 w-full" data-location="medias">
    <div class="container mx-auto my-8 p-4 bg-white shadow-lg rounded-lg">
        <!-- Film Title -->
        <header class="mb-4 ">
            <h1 class="text-2xl font-bold text-gray-800">
                Media of <span class="text-blue-600" th:text="${film.title}"></span>
            </h1>
             
        </header>

        <!-- Add Media Button -->
        <div class="flex justify-between items-center mb-4">
                                
            <button th:hx-get="@{/medias/add}"
                    hx-swap="outerHtml"
                    hx-target=".modalDiv"
                    class="px-4 py-2 bg-green-600 text-white font-semibold rounded hover:bg-green-500">
                <i class="fa-solid fa-plus"></i> Add Media
            </button>
            <div class="mt-4">
                <a href="/films" class="px-4 py-2 bg-blue-600 text-white font-semibold rounded hover:bg-blue-500">
                    <i class="fa-solid fa-arrow-left"></i> Return to Films Page
                </a>
            </div>
        </div>

        <!-- Media Table -->
        <table class="min-w-full bg-white border border-gray-300 rounded-lg shadow-md">
            <thead class="bg-gray-100 text-blue-900 font-bold">
                <tr>
                    <th class="py-3 px-4 text-left">#</th>
                    <th class="py-3 px-4 text-left">Media</th>
                    <th class="py-3 px-4 text-left">Type</th>
                    <th class="py-3 px-4 text-left">Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="media, iterStat : ${medias}" class="border-b hover:bg-gray-50">
                    <td class="py-3 px-4" th:text="${iterStat.index + 1}"></td>
                    <td class="py-3 px-4">
                    <button class="view-image-btn p-2 hover:opacity-70 transition-opacity"
							        th:data-image-src="${media.media}">
							    <i class="fa-regular fa-image text-blue-400"></i>
							</button>
                    </td>
                    <td class="py-3 px-4" th:text="${media.mediaType}"></td>
                    <td class="py-3 px-4">
                        <a th:href="@{/medias/{id_film}/delete/{id}(id_film=${film.id}, id=${media.id})}" 
                           class="px-3 py-1 text-white bg-red-600 rounded hover:bg-red-500">
                            Delete
                        </a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(medias)}">
                    <td colspan="4" class="text-center py-3 text-gray-500">No media available for this film.</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/htmx.org"></script>
      <div th:replace="~{fragments/film-image-modal}"></div>
                <script th:src="@{/js/viewImage.js}"></script>
                <script>
				    function confirmDelete(link) {
				        const isConfirmed = confirm("Are you sure you want to delete this film?");
				        if (isConfirmed) {
				            window.location.href = link.getAttribute("href");
				        }
				        return false; 
				    }
				</script>
    </main>
</body>
</html>
