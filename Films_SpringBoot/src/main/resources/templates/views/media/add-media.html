<div id="modal"
	class="modal fixed flex items-center justify-center inset-0 bg-gray-900 bg-opacity-60 transition-opacity z-50 overflow-scroll">
	<button
		class="absolute top-4 right-8 text-white text-3xl font-bold cursor-pointer hover:text-gray-400 close"
		onclick="closeModal()">
		<i class="fa-solid fa-xmark"></i>
	</button>
	<!-- Modal content -->
	<div
		class="p-5 bg-white shadow-lg rounded-lg relative w-4/5 max-w-3xl fade-in"
		data-location="product-create" id="contentDiv">
<div class="container mx-auto p-4 bg-white shadow-lg rounded-lg">
    <header class="mb-4">
        <h1 class="text-2xl font-bold text-gray-800">
            Add New Media
        </h1>
    </header>
    <form enctype="multipart/form-data" action="/medias/save" method="post" class="space-y-4">
        <!-- Input for media URL -->
        <div>
            <label for="file" class="block text-gray-700 font-semibold mb-2">Media:</label>
            <input type="file" id="file" name="file" accept="image/*" required class="w-full px-3 py-2 border border-gray-300 rounded-md">
        </div>
        
        <!-- Select for media type -->
        <div>
            <label for="mediaType" class="block text-gray-700 font-semibold mb-2">Media Type:</label>
            <select id="mediaType" name="mediaType" class="w-full px-3 py-2 border border-gray-300 rounded-md" required>
                <option value="IMAGE">Image</option>
                <option value="VIDEO">Video</option>
                <option value="DOCUMENT">Document</option>
            </select>
        </div>
        
        <!-- Submit button -->
        <div class="flex justify-end">
            <button type="submit" class="px-4 py-2 bg-green-600 text-white font-semibold rounded hover:bg-green-500">
                <i class="fa-solid fa-plus"></i> Add Media
            </button>
        </div>
    </form>
</div>


	</div>
</div>
