<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layouts/app}">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Users</title>
</head>

<body>
	<main layout:fragment="content" id="content" class="p-6 w-full"
		data-location="users">

		<!-- Users Table -->
		<div id="usersTable" th:fragment="usersTable" class="w-full">
			<header class="flex flex-row justify-between">
				<!-- Search Form -->
				<form hx-get="/users" hx-replace="outerHtml" hx-target="#usersTable"
					class="flex items-center space-x-2 mb-4">
					<div class="relative flex items-center">
						<i
							class="fa-solid fa-magnifying-glass absolute left-2 top-1/2 -translate-y-1/2 text-gray-500"></i>
						<input type="text" name="keyword" placeholder="Search Users..."
							class="pl-8 pr-2 py-2 border border-gray-300 rounded-l-lg focus:outline-none focus:ring-2 focus:ring-celeste-dark h-10 w-64"
							th:value="${keyword}" />
					</div>

					<!-- Role Filter -->
					<div class="relative flex items-center">
						<select name="role"
							class="pl-4 px-2 py-2 border border-gray-300 focus:outline-none focus:ring-2 focus:ring-celeste-dark h-10 w-40"
							th:value="${role}">
							<option value="">All Roles</option>
							<option th:each="r : ${roles}" th:value="${r}" th:text="${r}"
								th:selected="${#strings.equals(role, r)}"></option>
						</select>
					</div>

					<button type="submit"
						class="px-4 py-2 bg-blue-900 hover:bg-blue-600 text-white rounded-r-lg h-10">Search</button>
				</form>


				<!-- Add User Button -->
				<div class="flex items-center space-x-2">
					<a hx-get="/users/add" hx-target=".modalDiv" hx-swap="innerHtml"
						class="px-3 py-1 border border-gray-300 rounded hover:bg-gray-100 cursor-pointer select-none text-green-500">
						<i class="fa-solid fa-plus"></i> <span class="text-xs font-bold">Add
							User</span>
					</a>
				</div>
			</header>

			<table
				class="min-w-full bg-white border border-gray-300 rounded-lg shadow-md">
				<thead class="bg-zinc-100 text-blue-900 font-bold">
					<tr>
						<th class="py-3 px-4 text-left">Id</th>
						<th class="py-3 px-4 text-left">Username</th>
						<th class="py-3 px-4 text-left">Email</th>
						<th class="py-3 px-4 text-left">Role</th>
						<th class="py-3 px-4 text-left">Actions</th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="user : ${users.data}"
						class="border-b hover:bg-gray-100">
						<td class="py-3 px-4" th:text="${user.id}"></td>
						<td class="py-3 px-4" th:text="${user.username}"></td>
						<td class="py-3 px-4" th:text="${user.email}"></td>
						<td class="py-3 px-4" th:text="${user.role}"></td>
						<td class="py-3 px-4"><a
							th:hx-get="@{/users/edit/{id}(id=${user.id})}"
							th:hx-target=".modalDiv" th:hx-swap="innerHtml"
							class="text-blue-500 cursor-pointer">Edit</a> | <a
							th:href="@{/users/delete/{id}(id=${user.id})}"
							onclick="return confirmDelete(this);"
							class="text-red-500 cursor-pointer"> Delete </a></td>
					</tr>
				</tbody>
			</table>

			<!-- Pagination Controls -->
			<div class="flex justify-between items-center mt-4">
				<div>
					Page <span th:text="${users.pageNumber}"></span> of <span
						th:text="${users.totalPages}"></span> (Total items: <span
						th:text="${users.totalElements}"></span>)
				</div>
				<div class="flex items-center space-x-2">
					<a th:if="${users.hasPrevious}"
						th:hx-get="'/users?page=' + ${users.pageNumber - 1} + '&keyword=' + ${keyword}"
						hx-target="#usersTable"
						class="px-3 py-1 border border-gray-300 rounded hover:bg-gray-100 cursor-pointer select-none">
						<i class="fa-solid fa-arrow-left"></i>
					</a> <a th:if="${users.hasNext}"
						th:hx-get="'/users?page=' + ${users.pageNumber + 1} + '&keyword=' + ${keyword}"
						hx-target="#usersTable"
						class="px-3 py-1 border border-gray-300 rounded hover:bg-gray-100 cursor-pointer select-none">
						<i class="fa-solid fa-arrow-right"></i>
					</a>
				</div>
				<script>
					function confirmDelete(link) {
						const isConfirmed = confirm("Are you sure you want to delete this user?");
						if (isConfirmed) {
							window.location.href = link.getAttribute("href"); // Use the href attribute directly
						}
						return false; // Prevent the default action
					}
				</script>

			</div>
		</div>
	</main>
</body>

</html>
