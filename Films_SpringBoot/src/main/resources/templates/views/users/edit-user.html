<div id="modal"
      class="modal fixed flex items-center justify-center inset-0 bg-gray-900 bg-opacity-60 transition-opacity z-50 overflow-scroll">
      <button class="absolute top-4 right-8 text-white text-3xl font-bold cursor-pointer hover:text-gray-400 close"
            onclick="closeModal()">
            <i class="fa-solid fa-xmark"></i>
      </button>
      <!-- Modal content -->
      <div class="p-5 bg-white shadow-lg rounded-lg relative w-4/5 max-w-3xl fade-in" id="contentDiv">
            <h2
                  class="text-center text-gray-700 mb-6 text-2xl font-bold tracking-wide capitalize border-b-2 border-gray-300 py-2">
                  <i class="fa-solid fa-user"></i>
                  Update User with Username <span th:text="${user.username}"></span>
            </h2>

            <!-- Edit User Form -->
            <form th:action="@{'/users/edit/'+${user.id} }" th:object="${user}" method="post" class="space-y-8">

                  <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <!-- First Column -->
                        <div class="space-y-4">

                              <!-- Username -->
                              <div class="flex flex-col">
                                    <label for="username" class="text-gray-700 font-semibold flex items-center gap-2">
                                          <i class="fa-regular fa-user"></i> Username
                                    </label>
                                    <input type="text" id="username" th:field="*{username}"
                                          class="mt-1 p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring focus:ring-blue-800"
                                          placeholder="Enter username" required>
                              </div>


                              <!-- Email -->
                              <div class="flex flex-col">
                                    <label for="email" class="text-gray-700 font-semibold flex items-center gap-2">
                                          <i class="fa-regular fa-envelope"></i> Email
                                    </label>
                                    <input type="email" id="email" th:field="*{email}"
                                          class="mt-1 p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring focus:ring-blue-800"
                                          placeholder="Enter email" required>
                              </div>


                        </div>

                        <!-- Second Column -->
                        <div class="space-y-4">
                              <!-- User Role -->
                              <div class="flex flex-col">
                                    <label for="role" class="text-gray-700 font-semibold flex items-center gap-2">
                                          <i class="fa-solid fa-users-cog"></i> User Role
                                    </label>
                                    <select id="role" th:field="*{role}"
                                          class="mt-1 p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring focus:ring-blue-800"
                                          required>
                                          <option value="" selected>Select a Role</option>
                                          <option th:each="role : ${T(ntt.beca.films.shared.security.Role).values()}"
                                                th:value="${role}" th:text="${role}"></option>
                                    </select>
                              </div>


                        </div>
                  </div>

                  <!-- Submit Button -->
                  <div class="flex justify-end">
                        <button type="submit"
                              class="bg-blue-800 text-white px-6 py-2 rounded-lg shadow hover:bg-blue-900">
                              <i class="fa-solid fa-save"></i> Save Changes
                        </button>
                  </div>
            </form>
      </div>
</div>
