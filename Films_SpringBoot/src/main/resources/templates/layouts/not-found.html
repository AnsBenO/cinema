<!DOCTYPE html>
<html lang="en" xmlns:th="http://thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://thymeleaf.org">

<head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <!-- Tailwind CSS -->
      <link rel="stylesheet" th:href="@{/tailwind/output.css}" />
      <!-- Additional CSS -->
      <link rel="stylesheet" th:href="@{/css/styles.css}" />
      <!-- Font Awesome -->
      <link rel="stylesheet" th:href="@{/webjars/font-awesome/6.5.2/css/all.min.css}">

      <title>Page Not Found</title>
</head>

<body class="font-rubik bg-gray-50 text-gray-800">
      <!-- Container for the layout -->
      <div class="min-h-screen flex flex-col">


            <!-- Main Content -->
            <main class="flex flex-1 items-center justify-center p-6">
                  <div class="text-center">
                        <h1 class="text-6xl font-bold text-gray-800">404</h1>
                        <p class="text-2xl mt-4 text-gray-600">Page Not Found</p>
                        <p class="mt-2 text-gray-500">The page you are looking for doesn’t exist or has been moved.</p>

                        <div class="mt-6">
                              <a th:href="@{/dashboard}"
                                    class="px-6 py-3 bg-blue-600 text-white rounded-md shadow-md hover:bg-blue-700">
                                    <i class="fa-solid fa-home mr-2"></i> Go Back to Home
                              </a>
                        </div>
                  </div>
            </main>
      </div>
</body>

</html>
